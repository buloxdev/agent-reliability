<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #09090f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    }
    .title {
      color: #6366f1;
      font-size: 52px;
      font-weight: 700;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeIn 1s ease-out 0.3s forwards;
      letter-spacing: -1px;
    }
    .tagline {
      color: #9ca3af;
      font-size: 22px;
      font-weight: 400;
      opacity: 0;
      animation: fadeIn 1s ease-out 0.8s forwards;
    }
    .link {
      color: #6b7280;
      font-size: 16px;
      margin-top: 32px;
      opacity: 0;
      animation: fadeIn 1s ease-out 1.2s forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="title">Agent Reliability Scores</div>
  <div class="tagline">The credit score for AI agents.</div>
  <div class="link">github.com/hermes-agent/agent-reliability</div>
</body>
</html>
