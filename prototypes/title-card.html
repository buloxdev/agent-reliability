<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #09090f;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    }
    .text {
      color: #e5e7eb;
      font-size: 48px;
      font-weight: 600;
      opacity: 0;
      animation: fadeIn 1.5s ease-out forwards;
      text-align: center;
      letter-spacing: -1px;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="text">Can you trust your AI agent?</div>
</body>
</html>
